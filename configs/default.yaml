# Default public configuration for MaterialAI Workbench.
# Copy configs/local.example.yaml to configs/local.yaml for machine-specific paths.

workspace_root: workspace/material_ai_workbench

abaqus:
  command: D:/ABAQUS/2023/Commands/abaqus.bat
  smapython: D:/ABAQUS/2023/EstProducts/win_b64/code/bin/SMAPython.exe
  mcp_host: 127.0.0.1
  mcp_port: 48152
  default_cpus: 4

odb_postprocess:
  default_fields:
    - S
    - PEEQ
    - U
    - RF
    - CPRESS
    - COPEN
  frame_mode: last
  include_named_sets: true

surrogate_model:
  random_state: 42
  default_target: latest_odb_max_mises
  baseline_models:
    - random_forest
    - mlp

llm:
  provider: openai_compatible
  base_url_env: MATERIALAI_LLM_BASE_URL
  model_env: MATERIALAI_LLM_MODEL
  api_key_env: MATERIALAI_LLM_API_KEY
  require_user_confirmation: true
