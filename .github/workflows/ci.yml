name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[app,dev]"
      - name: Import smoke test
        run: python -c "from material_ai_workbench import WorkbenchConfig, JobQueue, train_multi_fidelity; import pylabfea; print('imports ok')"
      - name: Run tests
        run: pytest tests material_ai_workbench/tests -q -m "not slow"
      - name: Build package
        run: python -m build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t material-ai-workbench:ci .
      - name: Run Streamlit health check
        run: |
          docker run -d --name material-ai-workbench-ci -p 8501:8501 material-ai-workbench:ci
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8501/_stcore/health; then
              docker stop material-ai-workbench-ci
              exit 0
            fi
            sleep 2
          done
          docker logs material-ai-workbench-ci
          docker stop material-ai-workbench-ci || true
          exit 1

  desktop-backend-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install app dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[app]"
      - name: Start desktop backend and check health
        run: python -m material_ai_workbench.desktop_launcher --smoke-test --startup-timeout 120
